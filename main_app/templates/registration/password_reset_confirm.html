{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Set New Password - College ERP</title>
    <link rel="shortcut icon" href="{% static '/image/favicon1.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'dist/css/erpnext-style.css' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1 class="login-title">Set New Password</h1>
                <p class="login-subtitle">Enter your new password</p>
            </div>

            {% if validlink %}
            <form method="post" class="login-form">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> New Password
                    </label>
                    {{ form.new_password1 }}
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Confirm Password
                    </label>
                    {{ form.new_password2 }}
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-check"></i> Reset Password
                    </button>
                </div>
            </form>
            {% else %}
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-triangle"></i>
                The password reset link is invalid or has expired.
            </div>
            <a href="{% url 'password_reset' %}" class="btn btn-primary w-100">
                Request New Reset Link
            </a>
            {% endif %}
        </div>
    </div>
</body>
</html>
