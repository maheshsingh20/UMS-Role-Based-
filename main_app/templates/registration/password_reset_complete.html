{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password Reset Complete - College ERP</title>
    <link rel="shortcut icon" href="{% static '/image/favicon1.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'dist/css/erpnext-style.css' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-card text-center">
            <div class="mb-4">
                <i class="fas fa-check-circle text-success" style="font-size: 64px;"></i>
            </div>
            <h2 class="mb-3">Password Reset Complete</h2>
            <p class="text-muted mb-4">
                Your password has been successfully reset. 
                You can now login with your new password.
            </p>
            <a href="{% url 'login_page' %}" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i> Go to Login
            </a>
        </div>
    </div>
</body>
</html>
